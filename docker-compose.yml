# Docker Compose for Local Development
# Based on: .cursor/rules/15-devops-infrastructure.mdc lines 204-311

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: trimio-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trimio
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trimio-network

  # Redis
