[phases.setup]
nixPkgs = ["nodejs_22", "pnpm_9"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile --prod=false"]

[phases.build]
cmds = [
  "pnpm install --frozen-lockfile",
  "pnpm turbo run build --filter=@salon-ops/shared",
  "cd apps/api && pnpm prisma generate && cd ../..",
  "pnpm turbo run build --filter=@salon-ops/api"
]

[start]
cmd = "cd apps/api && node dist/server.js"
